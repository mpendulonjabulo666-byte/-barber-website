<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Barbershop Name] — Newcastle</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #17181A;
    color: #F2EFE9;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 60px;
    line-height: 1.6;
  }
  header {
    text-align: center;
    padding: 50px 0 30px;
    border-bottom: 2px solid #C89B3C;
  }
  header h1 {
    font-size: 36px;
    margin: 0 0 6px;
    color: #C89B3C;
    letter-spacing: 1px;
  }
  header p {
    color: #B5B0A6;
    margin: 0;
  }
  section {
    margin: 40px 0;
  }
  h2 {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #C89B3C;
    margin-bottom: 14px;
  }
  .service, .hours-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #333;
  }
  a { color: #C89B3C; }
</style>
</head>
<body>

<header>
  <h1>[BARBERSHOP NAME]</h1>
  <p>[Short tagline — e.g. "Fresh fades, fair prices"]</p>
</header>

<section id="services">
  <h2>Services</h2>
  <div class="service"><span>[Haircut]</span><span>R[price]</span></div>
  <div class="service"><span>[Beard trim]</span><span>R[price]</span></div>
  <div class="service"><span>[Haircut + Beard]</span><span>R[price]</span></div>
</section>

<section id="hours">
  <h2>Hours</h2>
  <div class="hours-row"><span>Mon – Fri</span><span>[e.g. 08:00 – 18:00]</span></div>
  <div class="hours-row"><span>Saturday</span><span>[e.g. 08:00 – 15:00]</span></div>
  <div class="hours-row"><span>Sunday</span><span>[Closed]</span></div>
</section>

<section id="location">
  <h2>Location</h2>
  <p>[Area / suburb, Newcastle]</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>WhatsApp: [number]</p>
</section>

</body>
</html>
